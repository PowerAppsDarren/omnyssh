name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  hygiene:
    name: Repo hygiene guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Guard the tracked tree (no docs, keys, or .env)
        run: bash scripts/hygiene-guard.sh

      - name: Exercise the guard on fixtures
        run: bash scripts/hygiene-guard.test.sh

  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Verify committed man page is up to date
        if: runner.os == 'Linux'
        run: git diff --exit-code doc/omny.1

      - name: Run tests
        run: cargo test --verbose

      - name: Clippy (no warnings)
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  tui-build-independence:
    name: TUI builds without the GUI toolchain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-independence-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Remove Node/npm from PATH
        run: |
          for b in node npm npx corepack pnpm yarn; do
            while p="$(command -v "$b" 2>/dev/null)"; do sudo rm -f "$p"; hash -r; done
          done
          echo "node: $(command -v node || echo absent)"

      - name: Bare build is core + TUI only (no Node, no Tauri)
        run: |
          test -z "$(command -v node)" || { echo "node still present"; exit 1; }
          cargo build --locked
          cargo test --locked
          test -f target/debug/omny || { echo "omny missing"; exit 1; }
          if [ -f target/debug/OmnySSH ]; then
            echo "GUI leaked into the bare build"; exit 1
          fi
          echo "OK: bare build produced omny, excluded OmnySSH, needed no Node."
